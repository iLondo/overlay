<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engel – TikTok Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;600&display=swap" rel="stylesheet">
<style>
  :root {
    --neon-pink:    #ff2d78;
    --neon-cyan:    #00f5ff;
    --neon-purple:  #bf00ff;
    --neon-green:   #39ff14;
    --bg:           #000000;
    --glass:        rgba(0,0,0,0.55);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Rajdhani', sans-serif;
    position: relative;
  }

  /* ── Scanline texture ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,245,255,0.015) 3px,
      rgba(0,245,255,0.015) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── Grid BG ── */
  .grid-bg {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridPulse 6s ease-in-out infinite;
  }
  @keyframes gridPulse {
    0%,100% { opacity: 0.4; }
    50%      { opacity: 1;   }
  }

  /* ── Glowing orbs ── */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.25;
    animation: orbFloat 8s ease-in-out infinite;
  }
  .orb-1 { width:500px; height:500px; background:var(--neon-pink);   top:-100px;  left:-120px; animation-delay:0s; }
  .orb-2 { width:400px; height:400px; background:var(--neon-purple); bottom:200px; right:-100px; animation-delay:3s; }
  .orb-3 { width:300px; height:300px; background:var(--neon-cyan);   top:800px;   left:50%;    animation-delay:1.5s; }
  @keyframes orbFloat {
    0%,100% { transform: translateY(0)    scale(1);    }
    50%      { transform: translateY(-40px) scale(1.08); }
  }

  /* ═══════════════════════════════════════════
     TOP BADGE  ── nombre principal
  ═══════════════════════════════════════════ */
  .top-badge {
    position: absolute;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
  }

  .name-label {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 120px;
    letter-spacing: 18px;
    text-transform: uppercase;
    color: #fff;
    position: relative;
    display: inline-block;
    /* layered neon glow */
    text-shadow:
      0 0 8px  var(--neon-cyan),
      0 0 20px var(--neon-cyan),
      0 0 45px var(--neon-cyan),
      0 0 100px var(--neon-cyan),
      0 0 160px rgba(0,245,255,0.5);
    animation: namePulse 3s ease-in-out infinite;
  }
  @keyframes namePulse {
    0%,100% {
      text-shadow:
        0 0 8px  var(--neon-cyan),
        0 0 20px var(--neon-cyan),
        0 0 45px var(--neon-cyan),
        0 0 100px var(--neon-cyan),
        0 0 160px rgba(0,245,255,0.5);
    }
    50% {
      text-shadow:
        0 0 4px  var(--neon-pink),
        0 0 15px var(--neon-pink),
        0 0 35px var(--neon-pink),
        0 0 80px var(--neon-pink),
        0 0 140px rgba(255,45,120,0.6);
    }
  }

  /* Decorative line under name */
  .name-line {
    display: block;
    width: 100%;
    height: 2px;
    margin-top: 4px;
    background: linear-gradient(90deg,
      transparent, var(--neon-cyan) 30%, var(--neon-pink) 70%, transparent);
    box-shadow: 0 0 12px var(--neon-cyan);
    animation: lineScan 2s linear infinite;
    background-size: 200% 100%;
  }
  @keyframes lineScan {
    0%   { background-position: 0% 0%; }
    100% { background-position: 200% 0%; }
  }

  .subtext {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 300;
    font-size: 30px;
    letter-spacing: 14px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    margin-top: 10px;
  }

  /* ═══════════════════════════════════════════
     CORNER DECORATIONS
  ═══════════════════════════════════════════ */
  .corner {
    position: absolute;
    width: 80px; height: 80px;
    border-color: var(--neon-cyan);
    border-style: solid;
    opacity: 0.8;
    animation: cornerBlink 4s ease-in-out infinite;
  }
  .corner-tl { top:60px;  left:60px;  border-width: 3px 0 0 3px; }
  .corner-tr { top:60px;  right:60px; border-width: 3px 3px 0 0; }
  .corner-bl { bottom:60px; left:60px;  border-width: 0 0 3px 3px; }
  .corner-br { bottom:60px; right:60px; border-width: 0 3px 3px 0; }
  @keyframes cornerBlink {
    0%,100% { box-shadow: 0 0 10px var(--neon-cyan); opacity:0.8; }
    50%      { box-shadow: 0 0 25px var(--neon-cyan); opacity:1;   }
  }

  /* ═══════════════════════════════════════════
     BOTTOM  ── live / info bar
  ═══════════════════════════════════════════ */
  .bottom-bar {
    position: absolute;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    width: 900px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  /* Live pill */
  .live-pill {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--glass);
    border: 1px solid var(--neon-pink);
    border-radius: 60px;
    padding: 14px 40px;
    box-shadow: 0 0 20px rgba(255,45,120,0.4), inset 0 0 15px rgba(255,45,120,0.08);
    backdrop-filter: blur(10px);
  }
  .live-dot {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--neon-pink);
    box-shadow: 0 0 12px var(--neon-pink);
    animation: liveBlink 1s ease-in-out infinite;
  }
  @keyframes liveBlink {
    0%,100% { opacity:1; box-shadow:0 0 12px var(--neon-pink); }
    50%      { opacity:0.3; box-shadow:none; }
  }
  .live-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    letter-spacing: 8px;
    color: var(--neon-pink);
    text-shadow: 0 0 15px var(--neon-pink);
  }

  /* Stats row */
  .stats-row {
    display: flex;
    gap: 40px;
  }
  .stat-card {
    background: var(--glass);
    border: 1px solid rgba(0,245,255,0.3);
    border-radius: 16px;
    padding: 18px 34px;
    text-align: center;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 18px rgba(0,245,255,0.15);
    min-width: 180px;
    transition: box-shadow 0.3s;
  }
  .stat-card:hover {
    box-shadow: 0 0 35px rgba(0,245,255,0.5);
  }
  .stat-icon {
    font-size: 28px;
    margin-bottom: 4px;
  }
  .stat-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 34px;
    font-weight: 700;
    color: var(--neon-cyan);
    text-shadow: 0 0 12px var(--neon-cyan);
  }
  .stat-label {
    font-size: 18px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
  }

  /* Social handle */
  .handle-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .handle-icon {
    font-size: 32px;
  }
  .handle-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 44px;
    letter-spacing: 6px;
    color: #fff;
    text-shadow:
      0 0 10px var(--neon-purple),
      0 0 25px var(--neon-purple);
  }

  /* ═══════════════════════════════════════════
     SIDE ACCENTS
  ═══════════════════════════════════════════ */
  .side-line {
    position: absolute;
    top: 260px;
    bottom: 280px;
    width: 2px;
    background: linear-gradient(
      to bottom,
      transparent,
      var(--neon-cyan) 20%,
      var(--neon-pink) 80%,
      transparent
    );
    box-shadow: 0 0 10px var(--neon-cyan);
    animation: sidePulse 5s ease-in-out infinite;
  }
  .side-line-left  { left: 40px; }
  .side-line-right { right: 40px; animation-delay: 2.5s; }
  @keyframes sidePulse {
    0%,100% { opacity:0.5; }
    50%      { opacity:1;   }
  }

  /* ── Tick marks on side lines ── */
  .side-ticks {
    position: absolute;
    top: 300px;
    display: flex;
    flex-direction: column;
    gap: 60px;
  }
  .side-ticks-left  { left: 32px; }
  .side-ticks-right { right: 32px; }
  .tick {
    width: 18px; height: 2px;
    background: var(--neon-cyan);
    box-shadow: 0 0 6px var(--neon-cyan);
  }
  .side-ticks-right .tick {
    background: var(--neon-pink);
    box-shadow: 0 0 6px var(--neon-pink);
  }

  /* ═══════════════════════════════════════════
     GLITCH frame animation (subtle)
  ═══════════════════════════════════════════ */
  .glitch-frame {
    position: absolute;
    inset: 0;
    pointer-events: none;
    animation: glitchFrame 7s steps(1) infinite;
  }
  @keyframes glitchFrame {
    0%,98%,100% { opacity:0; }
    98.5% {
      opacity:1;
      background: linear-gradient(
        transparent 20%,
        rgba(0,245,255,0.07) 20.5%,
        rgba(0,245,255,0.07) 21%,
        transparent 21%,
        transparent 60%,
        rgba(255,45,120,0.06) 60.5%,
        rgba(255,45,120,0.06) 61.5%,
        transparent 61.5%
      );
    }
  }

  /* ─── TikTok logo watermark ─── */
  .tiktok-wm {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.03;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 400px;
    color: #fff;
    letter-spacing: -10px;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>

  <!-- BG layers -->
  <div class="grid-bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="tiktok-wm">TT</div>

  <!-- Glitch -->
  <div class="glitch-frame"></div>

  <!-- Corners -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Side accents -->
  <div class="side-line side-line-left"></div>
  <div class="side-line side-line-right"></div>

  <div class="side-ticks side-ticks-left">
    <div class="tick"></div><div class="tick"></div><div class="tick"></div>
    <div class="tick"></div><div class="tick"></div><div class="tick"></div>
    <div class="tick"></div><div class="tick"></div><div class="tick"></div>
    <div class="tick"></div><div class="tick"></div><div class="tick"></div>
    <div class="tick"></div><div class="tick"></div><div class="tick"></div>
  </div>
  <div class="side-ticks side-ticks-right">
    <div class="tick"></div><div class="tick"></div><div class="tick"></div>
    <div class="tick"></div><div class="tick"></div><div class="tick"></div>
    <div class="tick"></div><div class="tick"></div><div class="tick"></div>
    <div class="tick"></div><div class="tick"></div><div class="tick"></div>
    <div class="tick"></div><div class="tick"></div><div class="tick"></div>
  </div>

  <!-- Main name badge -->
  <div class="top-badge">
    <span class="name-label">ENGEL</span>
    <span class="name-line"></span>
    <p class="subtext">live stream</p>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">

    <div class="live-pill">
      <div class="live-dot"></div>
      <span class="live-text">En vivo</span>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon">👁️</div>
        <div class="stat-value" id="viewers">0</div>
        <div class="stat-label">Viewers</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">❤️</div>
        <div class="stat-value" id="likes">0</div>
        <div class="stat-label">Likes</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💬</div>
        <div class="stat-value" id="comments">0</div>
        <div class="stat-label">Chats</div>
      </div>
    </div>

    <div class="handle-row">
      <span class="handle-icon">🎵</span>
      <span class="handle-text">@Engel</span>
    </div>

  </div>

  <script>
    // Animated counters (demo)
    function animCount(el, target, duration) {
      let start = 0;
      const step = Math.ceil(target / (duration / 50));
      const timer = setInterval(() => {
        start += step;
        if (start >= target) { start = target; clearInterval(timer); }
        el.textContent = start >= 1000
          ? (start / 1000).toFixed(1) + 'K'
          : start;
      }, 50);
    }
    animCount(document.getElementById('viewers'),  1247, 2000);
    animCount(document.getElementById('likes'),   38500, 3000);
    animCount(document.getElementById('comments'),  893, 2500);

    // Live fluctuation
    setInterval(() => {
      const v = document.getElementById('viewers');
      const cur = parseFloat(v.textContent) * (v.textContent.includes('K') ? 1000 : 1);
      const next = Math.max(800, cur + Math.floor(Math.random() * 20) - 8);
      v.textContent = next >= 1000 ? (next/1000).toFixed(1) + 'K' : next;
    }, 4000);
  </script>
</body>
</html>
