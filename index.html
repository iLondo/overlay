<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engel – TikTok Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;600&display=swap" rel="stylesheet">
<style>
  :root {
    --neon-pink:    #ff2d78;
    --neon-cyan:    #00f5ff;
    --neon-purple:  #bf00ff;
    --neon-green:   #39ff14;
    --bg:           #000000;
    --glass:        rgba(0,0,0,0.55);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
  }

  body {
    background: var(--bg);
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Rajdhani', sans-serif;
    position: relative;
    /* Scale all px values from a 1080×1920 base */
    font-size: calc(100vw / 36); /* 1rem ≈ 30px at 1080px wide */
  }

  /* ── Scanline texture ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,245,255,0.015) 3px,
      rgba(0,245,255,0.015) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── Grid BG ── */
  .grid-bg {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridPulse 6s ease-in-out infinite;
  }
  @keyframes gridPulse {
    0%,100% { opacity: 0.4; }
    50%      { opacity: 1;   }
  }

  /* ── Glowing orbs ── */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.25;
    animation: orbFloat 8s ease-in-out infinite;
  }
  .orb-1 { width:46vw; height:46vw; background:var(--neon-pink);   top:-5vh;  left:-10vw; animation-delay:0s; }
  .orb-2 { width:37vw; height:37vw; background:var(--neon-purple); bottom:10vh; right:-8vw; animation-delay:3s; }
  .orb-3 { width:28vw; height:28vw; background:var(--neon-cyan);   top:42vh;   left:50%;    animation-delay:1.5s; }
  @keyframes orbFloat {
    0%,100% { transform: translateY(0)    scale(1);    }
    50%      { transform: translateY(-40px) scale(1.08); }
  }

  /* ═══════════════════════════════════════════
     TOP BADGE  ── nombre principal
  ═══════════════════════════════════════════ */
  .top-badge {
    position: absolute;
    top: 4vh;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    white-space: nowrap;
  }

  .name-label {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 11vw;
    letter-spacing: 1.5vw;
    text-transform: uppercase;
    color: #fff;
    position: relative;
    display: inline-block;
    /* layered neon glow */
    text-shadow:
      0 0 8px  var(--neon-cyan),
      0 0 20px var(--neon-cyan),
      0 0 45px var(--neon-cyan),
      0 0 100px var(--neon-cyan),
      0 0 160px rgba(0,245,255,0.5);
    animation: namePulse 3s ease-in-out infinite;
  }
  @keyframes namePulse {
    0%,100% {
      text-shadow:
        0 0 8px  var(--neon-cyan),
        0 0 20px var(--neon-cyan),
        0 0 45px var(--neon-cyan),
        0 0 100px var(--neon-cyan),
        0 0 160px rgba(0,245,255,0.5);
    }
    50% {
      text-shadow:
        0 0 4px  var(--neon-pink),
        0 0 15px var(--neon-pink),
        0 0 35px var(--neon-pink),
        0 0 80px var(--neon-pink),
        0 0 140px rgba(255,45,120,0.6);
    }
  }

  /* Decorative line under name */
  .name-line {
    display: block;
    width: 100%;
    height: 2px;
    margin-top: 4px;
    background: linear-gradient(90deg,
      transparent, var(--neon-cyan) 30%, var(--neon-pink) 70%, transparent);
    box-shadow: 0 0 12px var(--neon-cyan);
    animation: lineScan 2s linear infinite;
    background-size: 200% 100%;
  }
  @keyframes lineScan {
    0%   { background-position: 0% 0%; }
    100% { background-position: 200% 0%; }
  }

  .subtext {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 300;
    font-size: 2.8vw;
    letter-spacing: 1.2vw;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    margin-top: 10px;
  }

  /* ═══════════════════════════════════════════
     CORNER DECORATIONS
  ═══════════════════════════════════════════ */
  .corner {
    position: absolute;
    width: 7vw; height: 7vw;
    border-color: var(--neon-cyan);
    border-style: solid;
    opacity: 0.8;
    animation: cornerBlink 4s ease-in-out infinite;
  }
  .corner-tl { top:3vh;  left:3vw;  border-width: 3px 0 0 3px; }
  .corner-tr { top:3vh;  right:3vw; border-width: 3px 3px 0 0; }
  .corner-bl { bottom:3vh; left:3vw;  border-width: 0 0 3px 3px; }
  .corner-br { bottom:3vh; right:3vw; border-width: 0 3px 3px 0; }
  @keyframes cornerBlink {
    0%,100% { box-shadow: 0 0 10px var(--neon-cyan); opacity:0.8; }
    50%      { box-shadow: 0 0 25px var(--neon-cyan); opacity:1;   }
  }

  /* ═══════════════════════════════════════════
     BOTTOM  ── live / info bar
  ═══════════════════════════════════════════ */
  .bottom-bar {
    position: absolute;
    bottom: 5vh;
    left: 50%;
    transform: translateX(-50%);
    width: 90vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.5vh;
  }

  /* Live pill */
  .live-pill {
    display: flex;
    align-items: center;
    gap: 1.2vw;
    background: var(--glass);
    border: 1px solid var(--neon-pink);
    border-radius: 60px;
    padding: 1.2vh 3.5vw;
    box-shadow: 0 0 20px rgba(255,45,120,0.4), inset 0 0 15px rgba(255,45,120,0.08);
    backdrop-filter: blur(10px);
  }
  .live-dot {
    width: 1.4vw; height: 1.4vw;
    border-radius: 50%;
    background: var(--neon-pink);
    box-shadow: 0 0 12px var(--neon-pink);
    animation: liveBlink 1s ease-in-out infinite;
  }
  .live-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.5vw;
    letter-spacing: 0.7vw;
    color: var(--neon-pink);
    text-shadow: 0 0 15px var(--neon-pink);
  }

  /* Stats row */
  .stats-row {
    display: flex;
    gap: 3vw;
  }
  .stat-card {
    background: var(--glass);
    border: 1px solid rgba(0,245,255,0.3);
    border-radius: 16px;
    padding: 1.5vh 2.5vw;
    text-align: center;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 18px rgba(0,245,255,0.15);
    min-width: 16vw;
    transition: box-shadow 0.3s;
  }
  .stat-card:hover {
    box-shadow: 0 0 35px rgba(0,245,255,0.5);
  }
  .stat-icon {
    font-size: 5vw;
    margin-bottom: 6px;
    display: block;
  }
  .stat-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 3.2vw;
    font-weight: 700;
    color: var(--neon-cyan);
    text-shadow: 0 0 12px var(--neon-cyan);
  }
  .stat-label {
    font-size: 1.6vw;
    letter-spacing: 0.4vw;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
  }

  /* Social handle */
  .handle-row {
    display: flex;
    align-items: center;
    gap: 1vw;
  }
  .handle-icon {
    font-size: 3vw;
  }
  .handle-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 4vw;
    letter-spacing: 0.5vw;
    color: #fff;
    text-shadow:
      0 0 10px var(--neon-purple),
      0 0 25px var(--neon-purple);
  }

  /* ═══════════════════════════════════════════
     SIDE ACCENTS
  ═══════════════════════════════════════════ */
  .side-line {
    position: absolute;
    top: 13vh;
    bottom: 14vh;
    width: 2px;
    background: linear-gradient(
      to bottom,
      transparent,
      var(--neon-cyan) 20%,
      var(--neon-pink) 80%,
      transparent
    );
    box-shadow: 0 0 10px var(--neon-cyan);
    animation: sidePulse 5s ease-in-out infinite;
  }
  .side-line-left  { left: 3vw; }
  .side-line-right { right: 3vw; animation-delay: 2.5s; }
  @keyframes sidePulse {
    0%,100% { opacity:0.5; }
    50%      { opacity:1;   }
  }

  .side-ticks {
    position: absolute;
    top: 15vh;
    display: flex;
    flex-direction: column;
    gap: 4vh;
  }
  .side-ticks-left  { left: 2.2vw; }
  .side-ticks-right { right: 2.2vw; }
  .tick {
    width: 1.6vw; height: 2px;
    background: var(--neon-cyan);
    box-shadow: 0 0 6px var(--neon-cyan);
  }
  .side-ticks-right .tick {
    background: var(--neon-pink);
    box-shadow: 0 0 6px var(--neon-pink);
  }

  /* ═══════════════════════════════════════════
     GLITCH frame animation (subtle)
  ═══════════════════════════════════════════ */
  .glitch-frame {
    position: absolute;
    inset: 0;
    pointer-events: none;
    animation: glitchFrame 7s steps(1) infinite;
  }
  @keyframes glitchFrame {
    0%,98%,100% { opacity:0; }
    98.5% {
      opacity:1;
      background: linear-gradient(
        transparent 20%,
        rgba(0,245,255,0.07) 20.5%,
        rgba(0,245,255,0.07) 21%,
        transparent 21%,
        transparent 60%,
        rgba(255,45,120,0.06) 60.5%,
        rgba(255,45,120,0.06) 61.5%,
        transparent 61.5%
      );
    }
  }

  .tiktok-wm {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.03;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 37vw;
    color: #fff;
    letter-spacing: -1vw;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>

  <!-- BG layers -->
  <div class="grid-bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="tiktok-wm">TT</div>

  <!-- Glitch -->
  <div class="glitch-frame"></div>

  <!-- Corners -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Side accents -->
  <div class="side-line side-line-left"></div>
  <div class="side-line side-line-right"></div>

  <div class="side-ticks side-ticks-left">
    <div class="tick"></div><div class="tick"></div><div class="tick"></div>
    <div class="tick"></div><div class="tick"></div><div class="tick"></div>
    <div class="tick"></div><div class="tick"></div><div class="tick"></div>
    <div class="tick"></div><div class="tick"></div><div class="tick"></div>
    <div class="tick"></div><div class="tick"></div><div class="tick"></div>
  </div>
  <div class="side-ticks side-ticks-right">
    <div class="tick"></div><div class="tick"></div><div class="tick"></div>
    <div class="tick"></div><div class="tick"></div><div class="tick"></div>
    <div class="tick"></div><div class="tick"></div><div class="tick"></div>
    <div class="tick"></div><div class="tick"></div><div class="tick"></div>
    <div class="tick"></div><div class="tick"></div><div class="tick"></div>
  </div>

  <!-- Main name badge -->
  <div class="top-badge">
    <span class="name-label">ENGEL</span>
    <span class="name-line"></span>
    <p class="subtext">live stream</p>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">

    <div class="live-pill">
      <div class="live-dot"></div>
      <span class="live-text">En vivo</span>
    </div>

    <div class="stats-row">
      <div class="stat-card"><div class="stat-icon">🎮</div></div>
      <div class="stat-card"><div class="stat-icon">🖥️</div></div>
      <div class="stat-card"><div class="stat-icon">⌨️</div></div>
      <div class="stat-card"><div class="stat-icon">🖱️</div></div>
    </div>

    <div class="handle-row">
      <span class="handle-icon">🎵</span>
      <span class="handle-text">@Engel</span>
    </div>

  </div>

  <script>
    document.querySelectorAll('.stat-card').forEach(card => {
      const icon = card.querySelector('.stat-icon');
      icon.style.transition = 'transform 0.2s';
      card.addEventListener('mouseenter', () => icon.style.transform = 'scale(1.3)');
      card.addEventListener('mouseleave', () => icon.style.transform = 'scale(1)');
    });
  </script>
</body>
</html>
